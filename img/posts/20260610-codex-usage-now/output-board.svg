<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">Codex output board</title>
  <desc id="desc">A board summarizing the kinds of output recently made with Codex.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18252d"/>
      <stop offset="1" stop-color="#0f171d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1100" height="680" rx="34" fill="url(#bg)"/>
  <text x="70" y="78" font-family="Georgia, 'Noto Serif KR', serif" font-size="44" font-weight="700" fill="#fff8e6">최근에 실제로 남은 것들</text>
  <text x="72" y="116" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="18" fill="#bfeee2">대화가 지나가도 파일과 배포물이 남으면, 그때부터 일이 된다.</text>

  <g transform="translate(80 164)" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" filter="url(#shadow)">
    <g transform="rotate(-3 118 96)">
      <rect width="220" height="180" rx="20" fill="#fff8e6"/>
      <text x="24" y="48" font-size="25" font-weight="700" fill="#102d36">블로그 글</text>
      <text x="24" y="86" font-size="17" fill="#526068">코덱스 사용일지</text>
      <text x="24" y="114" font-size="17" fill="#526068">프로젝트 소개</text>
      <text x="24" y="142" font-size="17" fill="#526068">이미지 포함 배포</text>
    </g>
    <g transform="translate(246 24) rotate(2 118 96)">
      <rect width="220" height="180" rx="20" fill="#5ed3bd"/>
      <text x="24" y="48" font-size="25" font-weight="700" fill="#102d36">운영 UI</text>
      <text x="24" y="86" font-size="17" fill="#102d36">자산 화면</text>
      <text x="24" y="114" font-size="17" fill="#102d36">블록 상태</text>
      <text x="24" y="142" font-size="17" fill="#102d36">안전 게이트</text>
    </g>
    <g transform="translate(492 0) rotate(-2 118 96)">
      <rect width="220" height="180" rx="20" fill="#f3c565"/>
      <text x="24" y="48" font-size="25" font-weight="700" fill="#102d36">스펙 문서</text>
      <text x="24" y="86" font-size="17" fill="#42351d">게임 루프</text>
      <text x="24" y="114" font-size="17" fill="#42351d">아키텍처</text>
      <text x="24" y="142" font-size="17" fill="#42351d">수용 기준</text>
    </g>
    <g transform="translate(738 24) rotate(3 118 96)">
      <rect width="220" height="180" rx="20" fill="#f7ded8"/>
      <text x="24" y="48" font-size="25" font-weight="700" fill="#102d36">작은 자동화</text>
      <text x="24" y="86" font-size="17" fill="#526068">파일 만들기</text>
      <text x="24" y="114" font-size="17" fill="#526068">TTS 분리</text>
      <text x="24" y="142" font-size="17" fill="#526068">반복 정리</text>
    </g>
    <g transform="translate(122 284) rotate(2 118 96)">
      <rect width="220" height="180" rx="20" fill="#d9f1e8"/>
      <text x="24" y="48" font-size="25" font-weight="700" fill="#102d36">리뷰 기록</text>
      <text x="24" y="86" font-size="17" fill="#526068">구현 뒤 검토</text>
      <text x="24" y="114" font-size="17" fill="#526068">품질 이슈</text>
      <text x="24" y="142" font-size="17" fill="#526068">다시 수정</text>
    </g>
    <g transform="translate(369 304) rotate(-2 118 96)">
      <rect width="220" height="180" rx="20" fill="#fff8e6"/>
      <text x="24" y="48" font-size="25" font-weight="700" fill="#102d36">배포 확인</text>
      <text x="24" y="86" font-size="17" fill="#526068">빌드</text>
      <text x="24" y="114" font-size="17" fill="#526068">링크 체크</text>
      <text x="24" y="142" font-size="17" fill="#526068">사이트 반영</text>
    </g>
    <g transform="translate(616 284) rotate(3 118 96)">
      <rect width="220" height="180" rx="20" fill="#5ed3bd"/>
      <text x="24" y="48" font-size="25" font-weight="700" fill="#102d36">아이디어 그림</text>
      <text x="24" y="86" font-size="17" fill="#102d36">게임 자산</text>
      <text x="24" y="114" font-size="17" fill="#102d36">공개용 다이어그램</text>
      <text x="24" y="142" font-size="17" fill="#102d36">글의 분위기</text>
    </g>
  </g>
</svg>
