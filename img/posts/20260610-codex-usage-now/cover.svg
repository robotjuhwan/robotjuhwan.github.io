<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Codex Usage Map</title>
  <desc id="desc">A public-safe map of recent Codex usage across projects, blog publishing, games, and automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.47" stop-color="#162f3d"/>
      <stop offset="1" stop-color="#f1b15a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9ed" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#d8f2e9" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#071014" flood-opacity="0.34"/>
    </filter>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#ffffff" opacity="0.14"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <circle cx="1040" cy="94" r="170" fill="#f6d66f" opacity="0.20"/>
  <circle cx="125" cy="590" r="210" fill="#5ed3bd" opacity="0.15"/>

  <g transform="translate(94 86)">
    <text x="0" y="0" font-family="Georgia, 'Noto Serif KR', serif" font-size="24" fill="#f9d990" letter-spacing="5">POUL.KR WORKLOG</text>
    <text x="0" y="72" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="700" fill="#fff9ed">CODEX</text>
    <text x="0" y="138" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="700" fill="#fff9ed">USAGE NOW</text>
    <text x="4" y="188" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="24" fill="#d8f2e9">2026.05.20 - 2026.06.10 로그 기준</text>
  </g>

  <g transform="translate(610 78)" filter="url(#softShadow)">
    <rect x="0" y="0" width="482" height="475" rx="34" fill="url(#panel)"/>
    <rect x="34" y="38" width="414" height="72" rx="22" fill="#101820" opacity="0.92"/>
    <text x="64" y="84" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#fff9ed">Codex Operating Room</text>
    <g transform="translate(48 144)">
      <path d="M178 0 C260 12 331 74 355 151 C383 244 329 338 238 365 C157 389 65 356 23 282 C-22 201 0 96 72 40 C101 17 137 2 178 0Z" fill="#102d36"/>
      <path d="M183 45 C238 52 287 92 303 145 C323 209 286 278 224 298 C168 315 104 292 74 241 C43 186 60 114 108 77 C129 60 154 48 183 45Z" fill="#5ed3bd" opacity="0.86"/>
      <circle cx="185" cy="174" r="76" fill="#fff9ed"/>
      <path d="M151 167 h66 a21 21 0 0 1 21 21 v20 a21 21 0 0 1-21 21 h-66 a21 21 0 0 1-21-21 v-20 a21 21 0 0 1 21-21Z" fill="#101820"/>
      <rect x="151" y="141" width="68" height="35" rx="15" fill="#101820"/>
      <circle cx="165" cy="196" r="8" fill="#f6d66f"/>
      <circle cx="205" cy="196" r="8" fill="#f6d66f"/>
      <path d="M159 219 C176 230 194 230 211 219" fill="none" stroke="#f6d66f" stroke-width="6" stroke-linecap="round"/>
      <g fill="#fff9ed" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="18" font-weight="700">
        <text x="140" y="28">HERMES</text>
        <text x="284" y="144">Blog</text>
        <text x="246" y="318">Game</text>
        <text x="22" y="301">Ju Office</text>
        <text x="12" y="118">Study</text>
      </g>
      <g stroke="#fff9ed" stroke-width="3" opacity="0.75" fill="none">
        <path d="M185 174 L172 42"/>
        <path d="M185 174 L300 153"/>
        <path d="M185 174 L259 304"/>
        <path d="M185 174 L83 286"/>
        <path d="M185 174 L55 122"/>
      </g>
    </g>
  </g>

  <g transform="translate(98 506)">
    <rect x="0" y="0" width="450" height="52" rx="26" fill="#fff9ed" opacity="0.14"/>
    <text x="26" y="34" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#fff9ed">From answers to operating room</text>
  </g>
</svg>
