<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc">
  <title id="title">What a subscription should leave behind</title>
  <desc id="desc">A receipt-style rule: paid AI use should leave code, tests, decisions, and memory.</desc>
  <rect width="1400" height="700" rx="32" fill="#c84e3b"/>
  <g transform="translate(218 58) rotate(1 480 290)">
    <rect width="964" height="580" rx="20" fill="#fff8e8"/>
    <text x="68" y="84" font-family="ui-monospace, Menlo, monospace" font-size="20" letter-spacing="3" fill="#c84e3b">MONTHLY CHECKOUT</text>
    <text x="68" y="145" font-family="Georgia, serif" font-size="48" fill="#14394a">Do not pay for answers.</text>
    <text x="68" y="196" font-family="Georgia, serif" font-size="48" fill="#14394a">Pay for work that remains.</text>
    <line x1="68" y1="238" x2="896" y2="238" stroke="#c9b889" stroke-width="2"/>
    <g transform="translate(68 284)" font-family="ui-monospace, Menlo, monospace" font-size="23" fill="#14394a">
      <text y="0">01  CODE I CAN READ AGAIN</text>
      <text y="58">02  TESTS I CAN RUN AGAIN</text>
      <text y="116">03  DECISIONS I CAN EXPLAIN</text>
      <text y="174">04  MEMORY THAT CONTINUES</text>
    </g>
    <circle cx="806" cy="418" r="77" fill="#f3d45e"/>
    <path d="M776 420l20 20 42-56" fill="none" stroke="#14394a" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="68" y="528" font-family="Arial, sans-serif" font-size="21" fill="#597078">A useful rhythm is slower than panic and stronger than one good session.</text>
  </g>
</svg>
