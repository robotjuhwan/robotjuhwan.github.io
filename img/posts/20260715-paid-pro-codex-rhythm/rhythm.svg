<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc">
  <title id="title">From sprint to rhythm</title>
  <desc id="desc">A calendar-like graphic moving from final-day sprint to a steady monthly development rhythm.</desc>
  <rect width="1400" height="700" rx="32" fill="#14394a"/>
  <text x="78" y="90" font-family="Georgia, serif" font-size="50" fill="#fff8e8">From the final sprint to a useful rhythm</text>
  <text x="80" y="130" font-family="ui-monospace, Menlo, monospace" font-size="17" letter-spacing="2" fill="#e8dcae">CODEX AFTER PAID PRO</text>
  <g transform="translate(78 200)">
    <rect width="510" height="345" rx="28" fill="#c84e3b"/>
    <text x="42" y="62" font-family="ui-monospace, Menlo, monospace" font-size="19" fill="#fff8e8">BEFORE</text>
    <text x="42" y="137" font-family="Georgia, serif" font-size="58" fill="#fff8e8">D-1 SPRINT</text>
    <text x="42" y="188" font-family="Arial, sans-serif" font-size="24" fill="#fff8e8">Use everything before it ends.</text>
    <g fill="#f3d45e"><circle cx="84" cy="262" r="20"/><circle cx="162" cy="242" r="20"/><circle cx="240" cy="278" r="20"/><circle cx="318" cy="230" r="20"/><circle cx="396" cy="262" r="20"/></g>
    <path d="M84 262L162 242 240 278 318 230 396 262" fill="none" stroke="#fff8e8" stroke-width="5"/>
  </g>
  <path d="M638 370h112" stroke="#f3d45e" stroke-width="9" stroke-linecap="round"/>
  <path d="m730 344 38 26-38 26" fill="none" stroke="#f3d45e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(812 200)">
    <rect width="510" height="345" rx="28" fill="#fff8e8"/>
    <text x="42" y="62" font-family="ui-monospace, Menlo, monospace" font-size="19" fill="#c84e3b">AFTER</text>
    <text x="42" y="137" font-family="Georgia, serif" font-size="58" fill="#14394a">MONTHLY RHYTHM</text>
    <text x="42" y="188" font-family="Arial, sans-serif" font-size="24" fill="#597078">Leave work that the next day can use.</text>
    <g transform="translate(42 238)" font-family="ui-monospace, Menlo, monospace" font-size="18" fill="#14394a">
      <rect width="96" height="54" rx="12" fill="#f3d45e"/><text x="48" y="34" text-anchor="middle">READ</text>
      <rect x="112" width="96" height="54" rx="12" fill="#b8d7c5"/><text x="160" y="34" text-anchor="middle">BUILD</text>
      <rect x="224" width="96" height="54" rx="12" fill="#e8dcae"/><text x="272" y="34" text-anchor="middle">REVIEW</text>
      <rect x="336" width="96" height="54" rx="12" fill="#c84e3b"/><text x="384" y="34" text-anchor="middle" fill="#fff8e8">RECORD</text>
    </g>
  </g>
  <text x="700" y="625" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#e8dcae">The subscription is useful only when the work survives the session.</text>
</svg>
