<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Codex work lanes</title>
  <desc id="desc">Three work lanes for Jue runtime, companion personality, and game interface work.</desc>
  <rect width="1400" height="760" rx="32" fill="#fff8e8"/>
  <text x="78" y="88" font-family="Georgia, serif" font-size="50" fill="#14394a">Where Codex is sitting beside me lately</text>
  <text x="80" y="130" font-family="ui-monospace, Menlo, monospace" font-size="17" letter-spacing="2" fill="#c84e3b">THREE WORK LANES, ONE PERSON</text>
  <g transform="translate(78 190)">
    <g>
      <rect width="368" height="420" rx="28" fill="#14394a"/>
      <text x="34" y="58" font-family="ui-monospace, Menlo, monospace" font-size="18" fill="#e8dcae">01 / HERMES JUE</text>
      <text x="34" y="126" font-family="Georgia, serif" font-size="43" fill="#fff8e8">Runtime</text>
      <text x="34" y="169" font-family="Georgia, serif" font-size="43" fill="#fff8e8">and safety</text>
      <path d="M34 220h300" stroke="#597078"/>
      <text x="34" y="270" font-family="Arial, sans-serif" font-size="21" fill="#d9e7df">research evidence</text>
      <text x="34" y="307" font-family="Arial, sans-serif" font-size="21" fill="#d9e7df">decision boundaries</text>
      <text x="34" y="344" font-family="Arial, sans-serif" font-size="21" fill="#d9e7df">tests and records</text>
      <circle cx="308" cy="342" r="26" fill="#f3d45e"/>
    </g>
    <g transform="translate(439)">
      <rect width="368" height="420" rx="28" fill="#b8d7c5"/>
      <text x="34" y="58" font-family="ui-monospace, Menlo, monospace" font-size="18" fill="#14394a">02 / JUE PERSONA</text>
      <text x="34" y="126" font-family="Georgia, serif" font-size="43" fill="#14394a">A calmer</text>
      <text x="34" y="169" font-family="Georgia, serif" font-size="43" fill="#14394a">companion</text>
      <path d="M34 220h300" stroke="#597078"/>
      <text x="34" y="270" font-family="Arial, sans-serif" font-size="21" fill="#14394a">friendly language</text>
      <text x="34" y="307" font-family="Arial, sans-serif" font-size="21" fill="#14394a">context that continues</text>
      <text x="34" y="344" font-family="Arial, sans-serif" font-size="21" fill="#14394a">less investment stress</text>
      <path d="M282 325c22-33 48-33 70 0-22 33-48 33-70 0Z" fill="none" stroke="#c84e3b" stroke-width="5"/>
    </g>
    <g transform="translate(878)">
      <rect width="368" height="420" rx="28" fill="#f3d45e"/>
      <text x="34" y="58" font-family="ui-monospace, Menlo, monospace" font-size="18" fill="#14394a">03 / OTHER MAKING</text>
      <text x="34" y="126" font-family="Georgia, serif" font-size="43" fill="#14394a">Game UI</text>
      <text x="34" y="169" font-family="Georgia, serif" font-size="43" fill="#14394a">and assets</text>
      <path d="M34 220h300" stroke="#597078"/>
      <text x="34" y="270" font-family="Arial, sans-serif" font-size="21" fill="#14394a">play diagnosis</text>
      <text x="34" y="307" font-family="Arial, sans-serif" font-size="21" fill="#14394a">screen audits</text>
      <text x="34" y="344" font-family="Arial, sans-serif" font-size="21" fill="#14394a">asset workflows</text>
      <rect x="276" y="315" width="56" height="56" rx="12" fill="#c84e3b"/>
    </g>
  </g>
  <text x="700" y="690" text-anchor="middle" font-family="Georgia, serif" font-size="29" fill="#14394a">The constant is not the project. It is the need to regain context quickly.</text>
</svg>
