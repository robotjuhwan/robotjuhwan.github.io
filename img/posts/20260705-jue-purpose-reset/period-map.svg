<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Period map</title>
  <desc id="desc">A timeline from June 28 to July 5 showing no trades, validation doubts, self repair, and purpose reset.</desc>
  <rect width="1280" height="520" rx="28" fill="#f6ead6"/>
  <text x="72" y="76" font-family="'Noto Sans KR', sans-serif" font-size="34" font-weight="800" fill="#10251f">최근 기록의 흐름</text>
  <line x1="112" y1="262" x2="1168" y2="262" stroke="#28493f" stroke-width="8" stroke-linecap="round"/>
  <g font-family="'Noto Sans KR', sans-serif">
    <g transform="translate(112 0)">
      <circle cx="0" cy="262" r="24" fill="#e7b36a"/>
      <text x="0" y="330" text-anchor="middle" font-size="22" font-weight="800" fill="#10251f">6/28</text>
      <text x="0" y="362" text-anchor="middle" font-size="18" fill="#4e7165">운영체제처럼 커진 쥬</text>
    </g>
    <g transform="translate(376 0)">
      <circle cx="0" cy="262" r="24" fill="#6d9c87"/>
      <text x="0" y="182" text-anchor="middle" font-size="22" font-weight="800" fill="#10251f">7/1</text>
      <text x="0" y="214" text-anchor="middle" font-size="18" fill="#4e7165">거래 없음, 보수성 의심</text>
    </g>
    <g transform="translate(640 0)">
      <circle cx="0" cy="262" r="24" fill="#e7b36a"/>
      <text x="0" y="330" text-anchor="middle" font-size="22" font-weight="800" fill="#10251f">7/2</text>
      <text x="0" y="362" text-anchor="middle" font-size="18" fill="#4e7165">19검증과 자가수리</text>
    </g>
    <g transform="translate(904 0)">
      <circle cx="0" cy="262" r="24" fill="#6d9c87"/>
      <text x="0" y="182" text-anchor="middle" font-size="22" font-weight="800" fill="#10251f">7/3</text>
      <text x="0" y="214" text-anchor="middle" font-size="18" fill="#4e7165">Codex Lab 운영 적용</text>
    </g>
    <g transform="translate(1168 0)">
      <circle cx="0" cy="262" r="24" fill="#e7b36a"/>
      <text x="0" y="330" text-anchor="middle" font-size="22" font-weight="800" fill="#10251f">7/5</text>
      <text x="0" y="362" text-anchor="middle" font-size="18" fill="#4e7165">목적을 다시 묻기</text>
    </g>
