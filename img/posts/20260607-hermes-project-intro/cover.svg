<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">HERMES 프로젝트 커버</title>
  <desc id="desc">자산, 리서치, 블록 트레이딩, 메모리, 안전장치가 연결된 HERMES 투자 운영실 커버 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#081116"/><stop offset="0.5" stop-color="#0e1c23"/><stop offset="1" stop-color="#17221d"/></linearGradient>
    <radialGradient id="glow" cx="70%" cy="22%" r="60%"><stop offset="0" stop-color="#5ee0c2" stop-opacity="0.38"/><stop offset="0.48" stop-color="#5ee0c2" stop-opacity="0.08"/><stop offset="1" stop-color="#5ee0c2" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/></pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.42"/></filter>
    <style><![CDATA[
      .title{font-family:'Space Grotesk','Pretendard','Noto Sans KR',sans-serif;font-weight:900;fill:#edf5f2;letter-spacing:-2px}
      .sub{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:700;fill:#a9bcb7}
      .mono{font-family:'IBM Plex Mono','SFMono-Regular',monospace;font-weight:700;fill:#5ee0c2}
      .chip{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:800;fill:#0b1518}
      .label{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:800;fill:#edf5f2}
    ]]></style>
  </defs>
  <rect width="1400" height="780" rx="44" fill="url(#bg)"/>
  <rect width="1400" height="780" fill="url(#glow)"/>
  <rect width="1400" height="780" fill="url(#grid)"/>
  <g transform="translate(94 112)">
    <rect x="0" y="0" width="188" height="52" rx="26" fill="#5ee0c2"/>
    <text x="94" y="35" text-anchor="middle" class="chip" font-size="23">PROJECT NOTE</text>
    <text x="0" y="156" class="title" font-size="118">HERMES</text>
    <text x="4" y="218" class="sub" font-size="35">자산, 리서치, 자동매매를 한 화면에서 보는</text>
    <text x="4" y="266" class="sub" font-size="35">내 투자 운영실 만들기</text>
    <g transform="translate(0 350)">
      <rect width="168" height="58" rx="20" fill="#5ee0c2"/><text x="84" y="37" text-anchor="middle" class="chip" font-size="22">KIS</text>
      <rect x="190" width="168" height="58" rx="20" fill="#d8b56d"/><text x="274" y="37" text-anchor="middle" class="chip" font-size="22">Binance</text>
      <rect x="380" width="168" height="58" rx="20" fill="#9ab8c8"/><text x="464" y="37" text-anchor="middle" class="chip" font-size="22">Research</text>
      <rect x="570" width="168" height="58" rx="20" fill="#65dda4"/><text x="654" y="37" text-anchor="middle" class="chip" font-size="22">Memory</text>
    </g>
  </g>
  <g transform="translate(775 158)" filter="url(#shadow)">
    <rect x="0" y="0" width="520" height="420" rx="34" fill="#10191f" stroke="#5ee0c2" stroke-opacity="0.34" stroke-width="3"/>
    <rect x="34" y="34" width="452" height="72" rx="22" fill="#142129" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="58" y="78" class="mono" font-size="26">TRADECRAFT CONTROL PLANE</text>
    <g transform="translate(34 136)">
      <rect width="138" height="88" rx="20" fill="#0e171c" stroke="#5ee0c2" stroke-opacity="0.3"/>
      <text x="22" y="36" class="label" font-size="19">Portfolio</text><text x="22" y="64" class="mono" font-size="24">-- KRW</text>
      <rect x="158" width="138" height="88" rx="20" fill="#0e171c" stroke="#d8b56d" stroke-opacity="0.3"/>
      <text x="180" y="36" class="label" font-size="19">Blocks</text><text x="180" y="64" class="mono" font-size="24">SAFE</text>
      <rect x="316" width="136" height="88" rx="20" fill="#0e171c" stroke="#9ab8c8" stroke-opacity="0.3"/>
      <text x="338" y="36" class="label" font-size="19">Research</text><text x="338" y="64" class="mono" font-size="24">RAG</text>
    </g>
    <g transform="translate(34 254)">
      <path d="M0 70 C74 20 130 99 205 48 C286 -7 333 108 452 35" fill="none" stroke="#5ee0c2" stroke-width="8" stroke-linecap="round"/>
      <path d="M0 116 H452" stroke="#ffffff" stroke-opacity="0.09"/>
      <path d="M0 78 H452" stroke="#ffffff" stroke-opacity="0.07"/>
      <path d="M0 40 H452" stroke="#ffffff" stroke-opacity="0.07"/>
      <circle cx="205" cy="48" r="11" fill="#d8b56d"/>
      <circle cx="452" cy="35" r="11" fill="#65dda4"/>
    </g>
  </g>
  <text x="700" y="700" text-anchor="middle" class="sub" font-size="23">투자 조언이 아니라, 내가 쓰려고 만드는 운영 시스템 이야기</text>
</svg>
