<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc">
  <title id="title">HERMES 모의 운영실 화면</title>
  <desc id="desc">민감한 실제 수치를 제거한 HERMES 투자 운영실 모의 화면</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0b1114"/><stop offset="1" stop-color="#101c21"/></linearGradient>
    <style><![CDATA[
      .h{font-family:'Space Grotesk','Pretendard','Noto Sans KR',sans-serif;font-weight:900;fill:#edf5f2}
      .t{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:800;fill:#edf5f2}
      .s{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:650;fill:#9aaea8}
      .m{font-family:'IBM Plex Mono','SFMono-Regular',monospace;font-weight:700;fill:#5ee0c2}
      .panel{fill:#10191f;stroke:#ffffff;stroke-opacity:.09;stroke-width:2}
      .line{stroke:#5ee0c2;stroke-width:7;fill:none;stroke-linecap:round}
    ]]></style>
  </defs>
  <rect width="1300" height="760" rx="42" fill="url(#bg)"/>
  <rect x="56" y="54" width="220" height="650" rx="30" fill="#10191f" stroke="#5ee0c2" stroke-opacity="0.24"/>
  <text x="92" y="110" class="h" font-size="38">HERMES</text>
  <text x="92" y="142" class="s" font-size="18">portfolio intelligence</text>
  <g class="s" font-size="20">
    <rect x="84" y="190" width="164" height="48" rx="16" fill="#5ee0c2" opacity=".95"/><text x="106" y="221" fill="#071512" font-weight="900">Dashboard</text>
    <text x="106" y="282">AI 질문</text><text x="106" y="338">전략·리서치</text><text x="106" y="394">쥬 메모리</text><text x="106" y="450">KIS 블록</text><text x="106" y="506">Binance</text><text x="106" y="562">설정</text>
  </g>
  <rect x="310" y="54" width="934" height="112" rx="30" fill="#10191f" stroke="#ffffff" stroke-opacity=".09"/>
  <text x="350" y="105" class="h" font-size="42">Investment Operations Cockpit</text>
  <text x="350" y="139" class="s" font-size="20">잔고, 리서치, 블록 상태를 한 곳에서 보는 작업실</text>
  <g transform="translate(310 200)">
    <rect class="panel" width="210" height="118" rx="24"/><text x="28" y="42" class="s" font-size="20">전체 자산</text><text x="28" y="82" class="m" font-size="30">MASKED</text>
    <rect class="panel" x="236" width="210" height="118" rx="24"/><text x="264" y="42" class="s" font-size="20">현금</text><text x="264" y="82" class="m" font-size="30">--</text>
    <rect class="panel" x="472" width="210" height="118" rx="24"/><text x="500" y="42" class="s" font-size="20">평가손익</text><text x="500" y="82" class="m" font-size="30">SAFE</text>
    <rect class="panel" x="708" width="226" height="118" rx="24"/><text x="736" y="42" class="s" font-size="20">연동 시장</text><text x="736" y="82" class="m" font-size="30">KIS · Binance</text>
  </g>
  <g transform="translate(310 354)">
    <rect class="panel" width="600" height="270" rx="28"/>
    <text x="30" y="50" class="t" font-size="28">자산 상세</text>
    <g class="s" font-size="18">
      <text x="32" y="96">자산</text><text x="172" y="96">유형</text><text x="302" y="96">수량</text><text x="432" y="96">상태</text>
      <line x1="30" x2="570" y1="116" y2="116" stroke="#fff" stroke-opacity=".12"/>
      <text x="32" y="154">KRW</text><text x="172" y="154">Cash</text><text x="302" y="154">masked</text><text x="432" y="154">available</text>
      <text x="32" y="198">KIS</text><text x="172" y="198">Account</text><text x="302" y="198">masked</text><text x="432" y="198">paper/live</text>
      <text x="32" y="242">BTC</text><text x="172" y="242">Crypto</text><text x="302" y="242">masked</text><text x="432" y="242">risk gate</text>
    </g>
    <rect class="panel" x="632" width="302" height="270" rx="28"/>
    <text x="662" y="50" class="t" font-size="28">Live Feed</text>
    <text x="662" y="95" class="s" font-size="19">readiness: green</text>
    <text x="662" y="136" class="s" font-size="19">research: fresh</text>
    <text x="662" y="177" class="s" font-size="19">memory: seeded</text>
    <text x="662" y="218" class="s" font-size="19">orders: locked</text>
  </g>
  <text x="650" y="700" text-anchor="middle" class="s" font-size="21">실제 계좌 화면이 아니라 블로그 공개용으로 수치를 가린 모의 화면</text>
</svg>
