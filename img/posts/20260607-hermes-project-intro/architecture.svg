<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc">
  <title id="title">HERMES 아키텍처</title>
  <desc id="desc">웹 UI, FastAPI, 쥬 매니저, 리서치, 메모리, 거래소 API가 연결되는 구조</desc>
  <defs>
    <marker id="a" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#5ee0c2"/></marker>
    <style><![CDATA[
      .h{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:900;fill:#edf5f2}.t{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:850;fill:#edf5f2}.s{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:650;fill:#9aaea8}.box{fill:#10191f;stroke:#5ee0c2;stroke-opacity:.33;stroke-width:4}
