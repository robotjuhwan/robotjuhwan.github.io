<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="720" viewBox="0 0 1300 720" role="img" aria-labelledby="title desc">
  <title id="title">HERMES 안전 게이트</title>
  <desc id="desc">실주문 전에 확인해야 하는 킬스위치, 현금, 수량, 중복 주문, 인증, 레이트리밋 안전 게이트</desc>
  <style><![CDATA[.h{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:900;fill:#2a211a}.t{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:850;fill:#2a211a}.s{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:650;fill:#67594b}.card{fill:#fff;stroke:#e45d3f;stroke-width:4}.ok{fill:#0f1a17;stroke:#5ee0c2;stroke-width:4}.oktext{fill:#edf5f2}]]></style>
  <rect width="1300" height="720" rx="42" fill="#fff4e2"/>
  <text x="88" y="82" class="h" font-size="48">자동매매에서 제일 중요한 건 멈출 수 있는 구조</text>
  <text x="90" y="124" class="s" font-size="24">쥬가 아무리 그럴듯한 의도를 만들어도, 안전 게이트가 막으면 주문은 나가지 않아야 한다.</text>
  <g transform="translate(92 205)">
    <rect class="card" width="240" height="138" rx="26"/><text x="120" y="55" text-anchor="middle" class="t" font-size="29">킬스위치</text><text x="120" y="96" text-anchor="middle" class="s" font-size="20">전체 실행 중지</text>
    <rect class="card" x="270" width="240" height="138" rx="26"/><text x="390" y="55" text-anchor="middle" class="t" font-size="29">현금/예산</text><text x="390" y="96" text-anchor="middle" class="s" font-size="20">돈보다 큰 주문 차단</text>
    <rect class="card" x="540" width="240" height="138" rx="26"/><text x="660" y="55" text-anchor="middle" class="t" font-size="29">수량/정밀도</text><text x="660" y="96" text-anchor="middle" class="s" font-size="20">거래소 규칙 확인</text>
    <rect class="card" x="810" width="240" height="138" rx="26"/><text x="930" y="55" text-anchor="middle" class="t" font-size="29">중복 주문</text><text x="930" y="96" text-anchor="middle" class="s" font-size="20">같은 의도 반복 방지</text>
  </g>
  <g transform="translate(228 410)">
    <rect class="card" width="240" height="138" rx="26"/><text x="120" y="55" text-anchor="middle" class="t" font-size="29">인증</text><text x="120" y="96" text-anchor="middle" class="s" font-size="20">운영 토큰 필요</text>
    <rect class="card" x="270" width="240" height="138" rx="26"/><text x="390" y="55" text-anchor="middle" class="t" font-size="29">레이트리밋</text><text x="390" y="96" text-anchor="middle" class="s" font-size="20">API 호출 속도 제한</text>
    <rect class="ok" x="540" width="300" height="138" rx="26"/><text x="690" y="55" text-anchor="middle" class="t oktext" font-size="29">주문 허용</text><text x="690" y="96" text-anchor="middle" class="s" fill="#9aaea8" font-size="20">모든 조건이 통과할 때만</text>
  </g>
  <text x="650" y="646" text-anchor="middle" class="s" font-size="22">이 글은 프로젝트 소개이며 투자 권유나 매매 추천이 아니다.</text>
</svg>
