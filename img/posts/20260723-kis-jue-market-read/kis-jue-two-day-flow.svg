<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">쥬의 이틀 국장 판단과 실행 흐름</title>
  <desc id="desc">시장 분위기, 실행 조건, 실제 관리 블록을 세 단계로 나눈 다이어그램</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f0dc"/>
      <stop offset="1" stop-color="#e8f0dd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#1f4238" flood-opacity=".15"/>
    </filter>
  </defs>
  <rect width="1440" height="720" fill="url(#bg)"/>
  <text x="88" y="78" fill="#1f4c3d" font-family="Georgia, serif" font-size="34" font-weight="700">쥬의 국장 판단은 세 단계를 거친다</text>
  <text x="89" y="116" fill="#6f6957" font-family="sans-serif" font-size="19">시장 분위기만으로 주문하지 않고, 근거와 가격 구조가 모두 갖춰져야 블록이 된다.</text>

  <g filter="url(#shadow)">
    <rect x="82" y="176" width="374" height="390" rx="28" fill="#2d6654"/>
    <rect x="533" y="176" width="374" height="390" rx="28" fill="#f8f1df"/>
    <rect x="984" y="176" width="374" height="390" rx="28" fill="#d66543"/>
  </g>
  <path d="M468 371h45" stroke="#527b65" stroke-width="8" stroke-linecap="round"/>
  <path d="M513 371l-20-14v28z" fill="#527b65"/>
  <path d="M919 371h45" stroke="#527b65" stroke-width="8" stroke-linecap="round"/>
  <path d="M964 371l-20-14v28z" fill="#527b65"/>

  <circle cx="132" cy="228" r="23" fill="#f5c45a"/>
  <text x="171" y="238" fill="#fff7e9" font-family="Georgia, serif" font-size="26" font-weight="700">1. 시장을 읽기</text>
  <text x="120" y="300" fill="#d9eadb" font-family="sans-serif" font-size="22">7월 22일 · 23일</text>
  <text x="120" y="345" fill="#fff7e9" font-family="Georgia, serif" font-size="34" font-weight="700">risk-on</text>
  <text x="120" y="391" fill="#e6f0e4" font-family="sans-serif" font-size="20">지수와 선도 섹터의</text>
  <text x="120" y="421" fill="#e6f0e4" font-family="sans-serif" font-size="20">상승·순환을 읽는다</text>
  <path d="M120 472h290" stroke="#97bca9" stroke-width="2" stroke-dasharray="6 8"/>
  <text x="120" y="511" fill="#fff7e9" font-family="sans-serif" font-size="18">분위기 = 매수 명령은 아님</text>

  <circle cx="584" cy="228" r="23" fill="#2d6654"/>
  <text x="623" y="238" fill="#24483d" font-family="Georgia, serif" font-size="26" font-weight="700">2. 실행 근거 확인</text>
  <text x="571" y="303" fill="#4a7668" font-family="sans-serif" font-size="20">후보의 자료 · 호가 ·</text>
  <text x="571" y="333" fill="#4a7668" font-family="sans-serif" font-size="20">진입/중단 기준을 대조</text>
  <rect x="570" y="375" width="300" height="61" rx="15" fill="#d8e8d8"/>
  <text x="720" y="414" text-anchor="middle" fill="#24483d" font-family="sans-serif" font-size="20" font-weight="700">조건이 비면 대기</text>
  <path d="M570 472h300" stroke="#c5b98d" stroke-width="2" stroke-dasharray="6 8"/>
  <text x="571" y="511" fill="#716b5e" font-family="sans-serif" font-size="18">후보 제안은 포지션이 아님</text>

  <circle cx="1035" cy="228" r="23" fill="#f7ecdc"/>
  <text x="1074" y="238" fill="#fff7e9" font-family="Georgia, serif" font-size="26" font-weight="700">3. 블록으로 관리</text>
  <text x="1021" y="303" fill="#fff4e7" font-family="sans-serif" font-size="20">삼성전자는 기존 보유를</text>
  <text x="1021" y="333" fill="#fff4e7" font-family="sans-serif" font-size="20">중기 관리 블록으로 편입</text>
  <rect x="1020" y="375" width="302" height="61" rx="15" fill="#f2cfb9"/>
  <text x="1171" y="414" text-anchor="middle" fill="#843d29" font-family="sans-serif" font-size="20" font-weight="700">목표·중단 기준을 함께 기록</text>
  <path d="M1020 472h302" stroke="#f1bd9f" stroke-width="2" stroke-dasharray="6 8"/>
  <text x="1021" y="511" fill="#fff4e7" font-family="sans-serif" font-size="18">23일은 새 블록 없이 관망</text>

  <text x="720" y="650" text-anchor="middle" fill="#6f6957" font-family="sans-serif" font-size="19">시장 판단과 실제 주문·보유 관리는 같은 말이 아니다.</text>
</svg>
