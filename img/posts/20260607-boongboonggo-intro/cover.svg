<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">붕붕고 소개 커버</title>
  <desc id="desc">자동 붕어빵 배달 오토바이와 작은 푸드테크 회사를 표현한 블로그 커버 이미지</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1cf"/>
      <stop offset="0.52" stop-color="#ffd7a6"/>
      <stop offset="1" stop-color="#f6a36d"/>
    </linearGradient>
    <linearGradient id="road" x1="0" x2="1">
      <stop offset="0" stop-color="#3d4052"/>
      <stop offset="1" stop-color="#212331"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#7a3b23" flood-opacity="0.25"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#ffffff" opacity="0.35"/>
    </pattern>
    <style><![CDATA[
      .title{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:900;letter-spacing:-2px;fill:#2e241c}
      .sub{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:700;fill:#6b4d36}
      .small{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:700;fill:#fff8ee}
      .label{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:800;fill:#513420}
    ]]></style>
  </defs>
