<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc">
  <title id="title">붕붕고 픽셀 에셋 보드</title>
  <desc id="desc">붕붕고의 픽셀 건물, 오토바이, 직원, 고객, UI 아이콘을 모아둔 에셋 보드</desc>
  <defs>
    <style><![CDATA[
      .h{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:900;fill:#2b2b35}
      .s{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:650;fill:#606070}
      .label{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:800;fill:#2b2b35}
      .panel{fill:#fff;stroke:#e0b66f;stroke-width:4}
    ]]></style>
  </defs>
  <rect width="1300" height="760" rx="42" fill="#fff8e8"/>
  <text x="80" y="78" class="h" font-size="48">지금 만들어둔 픽셀 에셋들</text>
  <text x="82" y="120" class="s" font-size="24">아직 완성 게임은 아니지만, “작은 경영게임”의 표정은 이미 꽤 잡혀 있다.</text>
  <g transform="translate(82 170)">
    <rect class="panel" width="1136" height="160" rx="28"/>
    <text x="30" y="48" class="label" font-size="28">건물</text>
    <image href="building-headquarters.png" x="190" y="20" width="120" height="120" image-rendering="pixelated"/>
    <image href="building-research-lab.png" x="350" y="20" width="120" height="120" image-rendering="pixelated"/>
    <image href="building-garage.png" x="510" y="20" width="120" height="120" image-rendering="pixelated"/>
    <image href="building-festival-booth.png" x="670" y="20" width="120" height="120" image-rendering="pixelated"/>
    <text x="900" y="72" class="s" font-size="22">본사, 연구소, 차고, 행사 부스</text>
    <text x="900" y="106" class="s" font-size="22">필드가 테이블보다 먼저 보이게 하는 재료</text>
  </g>
  <g transform="translate(82 360)">
    <rect class="panel" width="1136" height="150" rx="28"/>
    <text x="30" y="48" class="label" font-size="28">오토바이</text>
    <image href="bike-prototype-01.png" x="200" y="36" width="80" height="80" image-rendering="pixelated"/>
    <image href="bike-prototype-02.png" x="310" y="36" width="80" height="80" image-rendering="pixelated"/>
    <image href="bike-prototype-03.png" x="420" y="36" width="80" height="80" image-rendering="pixelated"/>
    <image href="bike-prototype-04.png" x="530" y="36" width="80" height="80" image-rendering="pixelated"/>
    <image href="fx-steam.png" x="660" y="42" width="64" height="64" image-rendering="pixelated"/>
    <image href="fx-sparkle.png" x="760" y="42" width="64" height="64" image-rendering="pixelated"/>
    <text x="900" y="72" class="s" font-size="22">4프레임 달리기와 김, 반짝임</text>
    <text x="900" y="106" class="s" font-size="22">붕붕고의 주인공은 차량 쪽에 가깝다</text>
  </g>
  <g transform="translate(82 540)">
    <rect class="panel" width="1136" height="150" rx="28"/>
    <text x="30" y="48" class="label" font-size="28">사람과 UI</text>
    <image href="staff-researcher.png" x="190" y="42" width="70" height="70" image-rendering="pixelated"/>
    <image href="staff-mechanic.png" x="285" y="42" width="70" height="70" image-rendering="pixelated"/>
    <image href="staff-analyst.png" x="380" y="42" width="70" height="70" image-rendering="pixelated"/>
    <image href="staff-recipe.png" x="475" y="42" width="70" height="70" image-rendering="pixelated"/>
    <image href="customer-regular.png" x="590" y="42" width="70" height="70" image-rendering="pixelated"/>
    <image href="customer-student.png" x="685" y="42" width="70" height="70" image-rendering="pixelated"/>
    <image href="ui-icon-research.png" x="800" y="48" width="58" height="58" image-rendering="pixelated"/>
    <image href="ui-icon-policy.png" x="875" y="48" width="58" height="58" image-rendering="pixelated"/>
    <image href="ui-icon-staff.png" x="950" y="48" width="58" height="58" image-rendering="pixelated"/>
    <image href="ui-icon-event.png" x="1025" y="48" width="58" height="58" image-rendering="pixelated"/>
  </g>
</svg>
