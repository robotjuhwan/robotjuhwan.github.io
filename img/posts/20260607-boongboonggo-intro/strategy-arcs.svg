<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc">
  <title id="title">붕붕고 전략 아이덴티티</title>
  <desc id="desc">초개인화, 따끈신속, 안정운영, 행사스타 네 가지 플레이 성향 카드</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fffdf5"/><stop offset="1" stop-color="#f8efe7"/></linearGradient>
    <style><![CDATA[
      .h{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:900;fill:#2a2520}
      .t{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:900;fill:#2a2520}
      .s{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:650;fill:#665a50}
      .chip{font-family:'Pretendard','Noto Sans KR',sans-serif;font-weight:800;fill:#fff}
    ]]></style>
  </defs>
  <rect width="1300" height="760" rx="42" fill="url(#bg)"/>
  <text x="90" y="84" class="h" font-size="48">플레이하면 내 붕붕고의 성격이 남는다</text>
  <text x="92" y="126" class="s" font-size="24">같은 24주라도 무엇을 밀었는지에 따라 엔딩 타이틀과 리플레이 이유가 달라지는 구조.</text>
  <g transform="translate(90 190)">
    <rect width="530" height="205" rx="32" fill="#fff" stroke="#e85d75" stroke-width="5"/>
    <circle cx="82" cy="80" r="46" fill="#e85d75"/><text x="82" y="90" text-anchor="middle" class="chip" font-size="32">맛</text>
    <text x="150" y="68" class="t" font-size="34">초개인화 붕붕고</text>
    <text x="150" y="112" class="s" font-size="23">고객마다 다른 취향을 기억하고</text><text x="150" y="146" class="s" font-size="23">시그니처 주문을 늘리는 플레이</text>
  </g>
  <g transform="translate(680 190)">
    <rect width="530" height="205" rx="32" fill="#fff" stroke="#e8992c" stroke-width="5"/>
    <circle cx="82" cy="80" r="46" fill="#e8992c"/><text x="82" y="90" text-anchor="middle" class="chip" font-size="32">열</text>
    <text x="150" y="68" class="t" font-size="34">따끈신속 붕붕고</text>
    <text x="150" y="112" class="s" font-size="23">빠르게 도착하고도 식지 않는</text><text x="150" y="146" class="s" font-size="23">이동식 자동조리를 밀어붙이는 플레이</text>
  </g>
  <g transform="translate(90 450)">
    <rect width="530" height="205" rx="32" fill="#fff" stroke="#2d9c75" stroke-width="5"/>
    <circle cx="82" cy="80" r="46" fill="#2d9c75"/><text x="82" y="90" text-anchor="middle" class="chip" font-size="32">운</text>
    <text x="150" y="68" class="t" font-size="34">안정운영 붕붕고</text>
    <text x="150" y="112" class="s" font-size="23">정비, 교육, 차량 조합으로</text><text x="150" y="146" class="s" font-size="23">반복 가능한 프랜차이즈를 만드는 플레이</text>
  </g>
  <g transform="translate(680 450)">
    <rect width="530" height="205" rx="32" fill="#fff" stroke="#5a75d8" stroke-width="5"/>
    <circle cx="82" cy="80" r="46" fill="#5a75d8"/><text x="82" y="90" text-anchor="middle" class="chip" font-size="32">상</text>
    <text x="150" y="68" class="t" font-size="34">행사스타 붕붕고</text>
    <text x="150" y="112" class="s" font-size="23">시식회, 장터, 엑스포에서</text><text x="150" y="146" class="s" font-size="23">공개 검증과 브랜드 증거를 쌓는 플레이</text>
  </g>
</svg>
