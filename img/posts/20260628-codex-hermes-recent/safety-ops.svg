  <rect width="1280" height="620" rx="28" fill="#10251f"/>
  <text x="72" y="78" font-family="'Noto Sans KR', sans-serif" font-size="36" font-weight="800" fill="#fff8e7">멈추면 드러나는 운영 장치</text>
  <g font-family="'Noto Sans KR', sans-serif" font-size="23" font-weight="800">
    <rect x="160" y="154" width="960" height="338" rx="170" fill="#f7efe1"/>
    <rect x="240" y="214" width="800" height="218" rx="110" fill="#b8dcca"/>
    <rect x="344" y="270" width="592" height="106" rx="53" fill="#10251f"/>
    <text x="640" y="332" text-anchor="middle" fill="#fff8e7">실거래 판단 루프</text>
    <text x="260" y="180" text-anchor="middle" fill="#10251f">검증</text>
