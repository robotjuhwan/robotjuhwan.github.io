<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Jue memory loop</title>
  <desc id="desc">Jue reads research, decides, executes, reviews, and updates memory.</desc>
  <rect width="1280" height="620" rx="28" fill="#10251f"/>
  <text x="72" y="78" font-family="'Noto Sans KR', sans-serif" font-size="36" font-weight="800" fill="#fff8e7">쥬가 기억을 가지는 루프</text>
  <g font-family="'Noto Sans KR', sans-serif" font-size="24" font-weight="700">
    <rect x="90" y="200" width="210" height="96" rx="20" fill="#f7efe1"/>
    <text x="195" y="240" text-anchor="middle" fill="#10251f">리서치</text>
    <text x="195" y="270" text-anchor="middle" font-size="17" fill="#31544a">보고서, 시장 흐름</text>
    <rect x="386" y="116" width="210" height="96" rx="20" fill="#b8dcca"/>
    <text x="491" y="156" text-anchor="middle" fill="#10251f">판단</text>
    <text x="491" y="186" text-anchor="middle" font-size="17" fill="#31544a">근거와 반론</text>
    <rect x="682" y="200" width="210" height="96" rx="20" fill="#f0a847"/>
    <text x="787" y="240" text-anchor="middle" fill="#10251f">실행</text>
    <text x="787" y="270" text-anchor="middle" font-size="17" fill="#31544a">블록, 주문, 상태</text>
    <rect x="532" y="404" width="210" height="96" rx="20" fill="#f7efe1"/>
    <text x="637" y="444" text-anchor="middle" fill="#10251f">복기</text>
    <text x="637" y="474" text-anchor="middle" font-size="17" fill="#31544a">손익보다 이유</text>
    <rect x="250" y="404" width="210" height="96" rx="20" fill="#b8dcca"/>
    <text x="355" y="444" text-anchor="middle" fill="#10251f">메모리</text>
    <text x="355" y="474" text-anchor="middle" font-size="17" fill="#31544a">다음 판단의 재료</text>
  </g>
  <g fill="none" stroke="#fff8e7" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.86">
    <path d="M300 224 C344 164 344 164 386 164"/>
    <path d="M596 164 C650 164 642 248 682 248"/>
    <path d="M787 296 C780 380 742 404 706 420"/>
    <path d="M532 452 L460 452"/>
    <path d="M355 404 C268 354 258 308 300 270"/>
  </g>
  <g fill="#fff8e7">
    <path d="M378 164 l-18 -12 v24z"/>
    <path d="M674 248 l-18 -12 v24z"/>
    <path d="M710 415 l-2 -21 -19 13z"/>
    <path d="M468 452 l18 -12 v24z"/>
    <path d="M295 278 l-21 2 13 -19z"/>
  </g>
  <text x="1004" y="258" font-family="'Noto Sans KR', sans-serif" font-size="24" font-weight="800" fill="#fff8e7">핵심 변화</text>
  <text x="1004" y="300" font-family="'Noto Sans KR', sans-serif" font-size="19" fill="#dceadf">답변 한 번으로 끝나지 않고</text>
  <text x="1004" y="332" font-family="'Noto Sans KR', sans-serif" font-size="19" fill="#dceadf">근거와 실패가 다음 판단에</text>
  <text x="1004" y="364" font-family="'Noto Sans KR', sans-serif" font-size="19" fill="#dceadf">다시 들어가는 구조</text>
</svg>
