    <text x="0" y="76" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800" fill="#fff9ed">CODEX AFTER</text>
    <text x="0" y="148" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800" fill="#fff9ed">JUNE 10</text>
    <text x="4" y="202" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#ccefe4">2026.06.10 - 2026.06.14</text>
  </g>
  <g transform="translate(626 74)" filter="url(#shadow)">
