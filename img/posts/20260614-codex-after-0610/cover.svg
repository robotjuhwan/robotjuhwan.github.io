<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Codex After June 10</title>
  <desc id="desc">A public-safe cover image for a Codex worklog after June 10.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.50" stop-color="#12313a"/>
      <stop offset="1" stop-color="#c78343"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4d8"/>
      <stop offset="1" stop-color="#bdebdc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#fff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1045" cy="70" r="170" fill="#f2c35b" opacity="0.18"/>
  <circle cx="100" cy="604" r="240" fill="#65d5bc" opacity="0.14"/>
  <g transform="translate(86 76)">
