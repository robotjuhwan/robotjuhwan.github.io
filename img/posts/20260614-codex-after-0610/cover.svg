    <rect x="34" y="34" width="394" height="72" rx="24" fill="#0c1820"/>
    <text x="64" y="80" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" fill="#fff9ed">Jue Control Loop</text>
    <g transform="translate(54 145)">
      <path d="M177 0 C260 8 338 72 359 158 C382 252 323 346 231 366 C140 386 45 330 17 243 C-13 149 32 47 120 13 C138 6 157 2 177 0Z" fill="#102d36"/>
      <circle cx="186" cy="184" r="96" fill="#f7f0da"/>
      <circle cx="186" cy="184" r="58" fill="#5ed3bd"/>
      <circle cx="186" cy="184" r="20" fill="#f2c35b"/>
      <g fill="none" stroke="#fff9ed" stroke-width="4" stroke-linecap="round" opacity="0.92">
        <path d="M186 46 V95"/>
        <path d="M324 184 H275"/>
        <path d="M186 322 V273"/>
        <path d="M48 184 H97"/>
