<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">HERMES Jue loop</title>
  <desc id="desc">Public-safe HERMES/Jue operating loop diagram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#091018"/><stop offset="1" stop-color="#173843"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#f3c565"/></marker>
  </defs>
  <rect width="1100" height="680" rx="34" fill="url(#bg)"/>
  <text x="70" y="78" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#fff9ed">HERMES/Jue가 점점 운영실이 되는 중</text>
  <text x="72" y="116" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="18" fill="#bdebdc">실제 종목, 잔고, 키 정보는 빼고 구조만 그렸다.</text>
  <g font-family="Arial, 'Apple SD Gothic Neo', sans-serif" text-anchor="middle">
    <g transform="translate(550 330)"><circle r="92" fill="#fff9ed"/><text y="-8" font-size="30" font-weight="800" fill="#102d36">Jue</text><text y="26" font-size="17" fill="#52646a">판단 + 회고</text></g>
    <g transform="translate(550 165)"><rect x="-128" y="-44" width="256" height="88" rx="24" fill="#5ed3bd"/><text y="-8" font-size="24" font-weight="800" fill="#102d36">Research</text><text y="22" font-size="16" fill="#102d36">보고서, RAG, 시장 신호</text></g>
    <g transform="translate(780 330)"><rect x="-128" y="-44" width="256" height="88" rx="24" fill="#f3c565"/><text y="-8" font-size="24" font-weight="800" fill="#102d36">KIS / Binance</text><text y="22" font-size="16" fill="#42351d">국장과 크립토 실행 통로</text></g>
    <g transform="translate(550 500)"><rect x="-128" y="-44" width="256" height="88" rx="24" fill="#f7ded8"/><text y="-8" font-size="24" font-weight="800" fill="#102d36">Memory</text><text y="22" font-size="16" fill="#52646a">블록 복기와 정책 누적</text></g>
    <g transform="translate(320 330)"><rect x="-128" y="-44" width="256" height="88" rx="24" fill="#fff9ed"/><text y="-8" font-size="24" font-weight="800" fill="#102d36">Safety</text><text y="22" font-size="16" fill="#52646a">락, 한도, 에러 알림</text></g>
  </g>
  <g fill="none" stroke="#f3c565" stroke-width="5" marker-end="url(#arrow)">
    <path d="M550 213 V238"/>
    <path d="M642 330 H690"/>
    <path d="M550 422 V447"/>
    <path d="M458 330 H410"/>
    <path d="M320 286 C365 200 444 155 514 154"/>
    <path d="M780 374 C728 476 654 505 585 501"/>
  </g>
  <text x="550" y="612" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="#fff9ed">이제 핵심은 더 많이 매매하는 게 아니라, 판단과 실행 사이의 안전한 루프를 만드는 것.</text>
</svg>
