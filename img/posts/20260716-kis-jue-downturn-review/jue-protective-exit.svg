<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">쥬의 하락장 관리 결과</title>
  <desc id="desc">14개의 관리 블록에서 한 개가 보호적 종료되고 13개가 유지된 과정을 표현한 다이어그램</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8e7"/>
      <stop offset="1" stop-color="#f2e6ca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#2b392f" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#paper)"/>
  <path d="M74 92H1126" stroke="#285747" stroke-width="3" stroke-dasharray="7 12" opacity=".58"/>
  <text x="76" y="67" fill="#244539" font-family="Georgia, serif" font-size="27" font-weight="700">하락장 점검: 숫자보다 먼저 규칙을 본다</text>
  <text x="77" y="126" fill="#71644f" font-family="sans-serif" font-size="18">장 시작 전 관리 블록</text>
  <g fill="#2e6755" filter="url(#shadow)">
    <circle cx="128" cy="202" r="30"/><circle cx="205" cy="202" r="30"/><circle cx="282" cy="202" r="30"/>
    <circle cx="359" cy="202" r="30"/><circle cx="436" cy="202" r="30"/><circle cx="513" cy="202" r="30"/>
    <circle cx="590" cy="202" r="30"/><circle cx="667" cy="202" r="30"/><circle cx="744" cy="202" r="30"/>
    <circle cx="821" cy="202" r="30"/><circle cx="898" cy="202" r="30"/><circle cx="975" cy="202" r="30"/>
    <circle cx="1052" cy="202" r="30"/>
  </g>
  <circle cx="1129" cy="202" r="30" fill="#c9613d" filter="url(#shadow)"/>
  <text x="596" y="274" text-anchor="middle" fill="#244539" font-family="Georgia, serif" font-size="34" font-weight="700">14개 관리 블록</text>
  <path d="M680 335C748 335 778 335 846 335" fill="none" stroke="#c9613d" stroke-width="7" stroke-linecap="round"/>
  <path d="M846 335l-26-17v34z" fill="#c9613d"/>
  <text x="760" y="315" text-anchor="middle" fill="#9b4b30" font-family="sans-serif" font-size="19" font-weight="700">보호 조건 충족</text>
  <g fill="#2e6755" filter="url(#shadow)">
    <circle cx="128" cy="459" r="30"/><circle cx="205" cy="459" r="30"/><circle cx="282" cy="459" r="30"/>
    <circle cx="359" cy="459" r="30"/><circle cx="436" cy="459" r="30"/><circle cx="513" cy="459" r="30"/>
    <circle cx="590" cy="459" r="30"/><circle cx="667" cy="459" r="30"/><circle cx="744" cy="459" r="30"/>
    <circle cx="821" cy="459" r="30"/><circle cx="898" cy="459" r="30"/><circle cx="975" cy="459" r="30"/>
    <circle cx="1052" cy="459" r="30"/>
  </g>
  <circle cx="1129" cy="459" r="30" fill="none" stroke="#c9613d" stroke-width="5" stroke-dasharray="7 8"/>
  <path d="M1110 459l13 13 24-30" fill="none" stroke="#c9613d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="596" y="531" text-anchor="middle" fill="#244539" font-family="Georgia, serif" font-size="34" font-weight="700">13개 유지 · 1개 보호적 종료</text>
  <text x="596" y="575" text-anchor="middle" fill="#71644f" font-family="sans-serif" font-size="18">새 진입보다 먼저 손절 규칙과 체결 확인을 통과시킨 결과</text>
</svg>
