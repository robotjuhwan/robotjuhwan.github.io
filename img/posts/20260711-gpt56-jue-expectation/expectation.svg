<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Expectation without magic</title>
  <desc id="desc">Improved intelligence supports context, repair, explanation, and calm while prediction remains uncertain.</desc>
  <rect width="1400" height="760" rx="32" fill="#091820"/>
  <text x="76" y="86" font-family="Georgia, Times New Roman, serif" font-size="50" fill="#f7f3e8">What I expect from a smarter Jue</text>
  <text x="78" y="128" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" letter-spacing="2" fill="#8ab2a3">NOT A TRADING ORACLE</text>
  <g transform="translate(76 200)" font-family="Arial, sans-serif">
    <g><rect width="286" height="270" rx="26" fill="#122a32" stroke="#9cf2c8" stroke-width="2"/><circle cx="52" cy="56" r="20" fill="#9cf2c8"/><text x="88" y="64" font-size="18" letter-spacing="2" fill="#9cf2c8">CONTEXT</text><text x="34" y="128" font-family="Georgia, Times New Roman, serif" font-size="30" fill="#f7f3e8">맥락을 놓치지</text><text x="34" y="167" font-family="Georgia, Times New Roman, serif" font-size="30" fill="#f7f3e8">않는 쥬</text><text x="34" y="225" font-size="18" fill="#a9c9bd">긴 작업과 기록의 연결</text></g>
    <g transform="translate(320)"><rect width="286" height="270" rx="26" fill="#122a32" stroke="#9cf2c8" stroke-width="2"/><circle cx="52" cy="56" r="20" fill="#9cf2c8"/><text x="88" y="64" font-size="18" letter-spacing="2" fill="#9cf2c8">REPAIR</text><text x="34" y="128" font-family="Georgia, Times New Roman, serif" font-size="30" fill="#f7f3e8">복잡함을 더하지</text><text x="34" y="167" font-family="Georgia, Times New Roman, serif" font-size="30" fill="#f7f3e8">않는 쥬</text><text x="34" y="225" font-size="18" fill="#a9c9bd">원인을 찾고 구조를 정리</text></g>
    <g transform="translate(640)"><rect width="286" height="270" rx="26" fill="#122a32" stroke="#f6bf78" stroke-width="2"/><circle cx="52" cy="56" r="20" fill="#f6bf78"/><text x="88" y="64" font-size="18" letter-spacing="2" fill="#f6bf78">EXPLAIN</text><text x="34" y="128" font-family="Georgia, Times New Roman, serif" font-size="30" fill="#f7f3e8">판단을 숨기지</text><text x="34" y="167" font-family="Georgia, Times New Roman, serif" font-size="30" fill="#f7f3e8">않는 쥬</text><text x="34" y="225" font-size="18" fill="#cdbb95">쉬운 말로 이유를 설명</text></g>
    <g transform="translate(960)"><rect width="286" height="270" rx="26" fill="#163229" stroke="#9cf2c8" stroke-width="2"/><circle cx="52" cy="56" r="20" fill="#9cf2c8"/><text x="88" y="64" font-size="18" letter-spacing="2" fill="#9cf2c8">CALM</text><text x="34" y="128" font-family="Georgia, Times New Roman, serif" font-size="30" fill="#f7f3e8">나를 더 흔들지</text><text x="34" y="167" font-family="Georgia, Times New Roman, serif" font-size="30" fill="#f7f3e8">않는 쥬</text><text x="34" y="225" font-size="18" fill="#a9c9bd">사실과 감정을 분리</text></g>
  </g>
  <rect x="76" y="540" width="1246" height="116" rx="28" fill="#2a261b" stroke="#f6bf78" stroke-opacity=".7"/>
  <text x="699" y="587" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" letter-spacing="3" fill="#f6bf78">THE LINE THAT DOES NOT MOVE</text>
  <text x="699" y="627" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="30" fill="#f7f3e8">Prediction stays uncertain. Safety stays deterministic.</text>
</svg>
