<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">댓글 창과 쥬의 빈칸</title>
  <desc id="desc">블로그 댓글과 투자 동료 쥬의 안전한 판단 과정을 연결한 다이어리 표지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#101b1a"/><stop offset="1" stop-color="#254b45"/></linearGradient>
    <linearGradient id="card" x1="0" x2="1"><stop stop-color="#f5e7bf"/><stop offset="1" stop-color="#bddecf"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#8ed1bd" stroke-opacity=".13"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1024" cy="106" r="132" fill="#f3bd68" fill-opacity=".18"/>
  <circle cx="136" cy="556" r="180" fill="#55b2a0" fill-opacity=".16"/>
