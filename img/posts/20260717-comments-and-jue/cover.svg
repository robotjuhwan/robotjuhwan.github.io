      <text x="13" y="27" fill="#fff" font-family="sans-serif" font-size="15">보유 확인</text>
      <text x="137" y="27" fill="#fff" font-family="sans-serif" font-size="15">근거 조사</text>
      <text x="260" y="27" fill="#fff" font-family="sans-serif" font-size="15">안전 판단</text>
