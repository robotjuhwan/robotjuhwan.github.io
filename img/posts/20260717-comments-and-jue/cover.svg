  <text x="92" y="191" fill="#fff8df" font-family="sans-serif" font-size="58" font-weight="700">댓글을 달고,</text>
  <text x="92" y="260" fill="#fff8df" font-family="sans-serif" font-size="58" font-weight="700">쥬의 빈 칸을 찾았다</text>
  <g transform="translate(92 338)">
