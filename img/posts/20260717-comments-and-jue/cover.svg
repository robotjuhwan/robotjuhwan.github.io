    <text x="34" y="52" fill="#a6e1ca" font-family="sans-serif" font-size="21" letter-spacing="3">BLOG</text>
    <rect x="32" y="76" width="386" height="60" rx="14" fill="#192d29"/>
    <circle cx="63" cy="106" r="14" fill="#e6ba72"/>
    <path d="M95 99h204M95 117h134" stroke="#d8eee4" stroke-width="9" stroke-linecap="round" opacity=".9"/>
    <text x="32" y="162" fill="#d8eee4" font-family="sans-serif" font-size="18">읽은 뒤, 한 줄을 남길 수 있는 자리</text>
  </g>
  <path d="M570 429h76" stroke="#f0c870" stroke-width="5" stroke-linecap="round"/>
  <path d="m636 413 22 16-22 16" fill="none" stroke="#f0c870" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(688 338)">
